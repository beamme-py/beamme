name: Build source distribution and build and test wheels for pull requests and merges to main
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

jobs:
  build-src-dist:
    name: build-source-distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Build source distribution
        uses: ./.github/actions/source_distribution_build

  build-test-wheels:
    name: build-test-wheel python 3.14 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Build wheels
        uses: ./.github/actions/wheel_build
        with:
          python-version: "3.14"
          wheel-name: wheels-${{ matrix.os }}-py3.14
      - name: Test wheels
        uses: ./.github/actions/wheel_test
        with:
          python-version: "3.14"
          wheel-name: wheels-${{ matrix.os }}-py3.14

  all-build-wheels-pass:
    name: All build wheels passed
    runs-on: ubuntu-latest
    needs: [build-src-dist, build-test-wheels]
    if: always()
    steps:
      - name: Check build wheels result
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}

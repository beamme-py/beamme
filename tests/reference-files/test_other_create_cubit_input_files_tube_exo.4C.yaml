PROBLEM TYPE:
  PROBLEMTYPE: "Structure"
IO:
  VERBOSITY: "Standard"
IO/RUNTIME VTK OUTPUT:
  OUTPUT_DATA_FORMAT: "binary"
  INTERVAL_STEPS: 1
  EVERY_ITERATION: false
IO/RUNTIME VTK OUTPUT/STRUCTURE:
  OUTPUT_STRUCTURE: true
  DISPLACEMENT: true
SOLVER 1:
  NAME: "Structure_Solver"
  SOLVER: "UMFPACK"
STRUCTURAL DYNAMIC:
  LINEAR_SOLVER: 1
  INT_STRATEGY: "Standard"
  DYNAMICTYPE: "Statics"
  RESTARTEVERY: 5
  PREDICT: "TangDis"
  TIMESTEP: 0.05
  NUMSTEP: 20
  MAXTIME: 1.0
  TOLRES: 1e-05
  TOLDISP: 1e-11
  MAXITER: 20
STRUCTURE GEOMETRY:
  FILE: "test_other_create_cubit_input_files_tube_exo.exo"
  SHOW_INFO: "detailed_summary"
  ELEMENT_BLOCKS:
    - ID: 1
      SOLID:
        HEX8:
          MAT: 1
          KINEM: "nonlinear"
MATERIALS:
  - MAT: 1
    MAT_Struct_StVenantKirchhoff:
      YOUNG: 1000000000.0
      NUE: 0.0
      DENS: 7.8e-06
DESIGN SURF DIRICH CONDITIONS:
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [0, 0, 0]
    FUNCT: [0, 0, 0]
    E: 1
    ENTITY_TYPE: "node_set_id"
  - NUMDOF: 3
    ONOFF: [1, 1, 1]
    VAL: [3.0, 3.0, 0]
    FUNCT: [1, 2, 0]
    E: 2
    ENTITY_TYPE: "node_set_id"
FUNCT1:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "cos(2*pi*t)"
FUNCT2:
  - COMPONENT: 0
    SYMBOLIC_FUNCTION_OF_SPACE_TIME: "sin(2*pi*t)"

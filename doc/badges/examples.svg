<svg aria-label="examples: BeamMe" height="20" role="img" width="120" xmlns="http://www.w3.org/2000/svg">
  <title>examples: BeamMe</title>
  <filter id="blur">
    <feGaussianBlur stdDeviation="16"/>
  </filter>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect height="20" rx="3" width="120"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect fill="#555" height="20" width="63"/>
    <rect fill="#007ec6" height="20" width="57" x="63"/>
    <rect fill="url(#s)" height="20" width="120"/>
  </g>
  <g fill="#fff" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="110" text-anchor="middle" text-rendering="geometricPrecision">
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text fill-opacity=".8" filter="url(#blur)" textLength="530" x="325" y="150">examples</text>
        <text fill-opacity=".3" textLength="530" x="325" y="150">examples</text>
      </g>
      <text textLength="530" x="325" y="140">examples</text>
    </g>
    <g transform="scale(.1)">
      <g aria-hidden="true" fill="#010101">
        <text fill-opacity=".8" filter="url(#blur)" textLength="470" x="905" y="150">BeamMe</text>
        <text fill-opacity=".3" textLength="470" x="905" y="150">BeamMe</text>
      </g>
      <text textLength="470" x="905" y="140">BeamMe</text>
    </g>
  </g>
</svg>
